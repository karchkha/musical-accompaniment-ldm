# @package _global_

project_name: "MSDM"
log_directory: "lightning_logs"
mode: train # train | test | validate_all

id:
  version: "Testing_audiodm_uncond"
  name: ""

model:
  _target_: main.module_base.Audio_DM_Model
  learning_rate: 1.e-4
  beta1: 0.9
  beta2: 0.99
  class_cond: False
  in_channels: 1
  channels: 256
  patch_factor: 16
  patch_blocks: 1
  resnet_groups: 8
  kernel_multiplier_downsample: 2
  kernel_sizes_init: [1, 3, 7]
  multipliers: [1, 2, 4, 4, 4, 4, 4]
  factors: [4, 4, 4, 2, 2, 2]
  num_blocks: [2, 2, 2, 2, 2, 2]
  attentions: [False, False, False, True, True, True]
  attention_heads: 8
  attention_features: 128
  attention_multiplier: 2
  use_nearest_upsample: False
  use_skip_scale: True
  use_attention_bottleneck: True
  diffusion_sigma_data: 0.2
  diffusion_dynamic_threshold: 0.0

diffusion_sigma_distribution:
  _target_: audio_diffusion_pytorch_.LogNormalDistribution
  mean: -3.0
  std: 1.0



train_dataset:
  _target_: main.data.TracksDataset
  audio_files_dir: "dataset/slakh2100/train"
  sr: 22050
  channels: 1
  min_duration: 12.0
  max_duration: 640.0
  aug_shift: True
  sample_length: 262144
  stems: ['bass', 'drums', 'guitar', 'piano']

val_dataset:
  _target_: main.data.TracksDataset
  audio_files_dir: "dataset/slakh2100/validation"
  sr: 22050
  channels: 1
  min_duration: 12.0
  max_duration: 640.0
  aug_shift: False #True
  sample_length: 262144
  stems: ['bass', 'drums', 'guitar', 'piano']

datamodule:
  batch_size: 50
  num_workers: 4
  pin_memory: True



audio_samples_logger:
  _target_: main.module_base.SampleLogger
  num_items: 1
  channels: 1
  sampling_rate: 22050
  length: 262144
  sampling_steps: [100]
  # stems: ['bass', 'drums', 'guitar', 'piano']
diffusion_sampler:
  _target_: audio_diffusion_pytorch_.ADPM2Sampler
  rho: 1.0
diffusion_schedule:
  _target_: audio_diffusion_pytorch_.KarrasSchedule
  sigma_min: 0.0001
  sigma_max: 3.0
  rho: 9.0



callbacks:
  rich_progress_bar:
    _target_: pytorch_lightning.callbacks.RichProgressBar

  model_summary:
    _target_: pytorch_lightning.callbacks.RichModelSummary
    max_depth: 2




trainer:
  accelerator: cuda
  devices: [2] # Set `1` to train on GPU, `0` to train on CPU only, and `-1` to train on all GPUs, default `0`
  precision: "bf16" # Precision used for tensors, default `32`
  min_epochs: 0
  max_epochs: -1
  enable_model_summary: False
  log_every_n_steps: 10 # Logs metrics every N batches
  check_val_every_n_epoch: null
  val_check_interval: 4000
  limit_val_batches:
  limit_train_batches:
  strategy: ddp

resume_from_checkpoint: lightning_logs/MSDM/2024-07-12T22-47-15__Testing_audiodm_uncond/checkpoints/last.ckpt